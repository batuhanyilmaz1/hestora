name: hestora
description: Hestora real estate CRM (base architecture).
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^15.1.2
  supabase_flutter: ^2.8.4
  intl: ^0.20.2
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3
  http: ^1.4.0
  share_plus: ^11.0.0
  path_provider: ^2.1.5
  image_picker: ^1.1.2
  flutter_contacts: ^1.1.9+2
  cross_file: ^0.3.4+2
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  app_links: ^6.4.0
  mime: ^2.0.0
  flutter_dotenv: ^5.2.1
  qr_flutter: ^4.1.0
  image: ^4.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
    - assets/branding/
    - assets/logo/
    - assets/splash/
    - assets/onboarding/
    - assets/themes/
    - assets/themes/json/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logo/LOGO.png
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: assets/logo/LOGO.png
